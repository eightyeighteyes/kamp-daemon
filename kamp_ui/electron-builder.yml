appId: com.kamp.app
productName: Kamp
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # Exclude binary build artifacts — handled by extraResources (copied directly
  # to Contents/Resources/ outside the ASAR, no double-packing).
  - '!resources/kamp/**'
  - '!resources/mpv'
  - '!resources/mpv-libs/**'
  - '!resources/node'
  - '!resources/npm/**'
  - '!resources/icon_1024.png'
  - '!resources/now-playing-helper'
  - '!resources/kamp-keychain-helper'
  # Explicitly include compiled JS (electron-vite output) so it is packed into
  # the ASAR. Without this, the positive 'extensions/**' pattern below changes
  # electron-builder's default glob behavior and out/ is not included.
  - 'out/**'
  - 'extensions/**'
  # Groover is a dev tool / optional npm add-on; it distributes via npm, not
  # in the app bundle. This exclusion is belt-and-suspenders: Groover lives at
  # the repo root (../extensions/kamp-groover), outside this build context, so
  # it is already absent from the ASAR. The pattern guards against accidental
  # inclusion if the directory is ever moved into kamp_ui/extensions/.
  - '!extensions/kamp-groover/**'
asarUnpack:
  - resources/**
extraResources:
  # PyInstaller onedir bundle → Contents/Resources/kamp/
  - from: resources/kamp
    to: kamp
    filter:
      - '**/*'
  # Standalone mpv binary → Contents/Resources/mpv
  - from: resources/mpv
    to: mpv
  # Bundled mpv dylibs → Contents/Resources/mpv-libs/
  # dylibbundler rewrites mpv's load commands to @executable_path/mpv-libs/<lib>
  # so this directory must be a sibling of the mpv binary in Contents/Resources/.
  - from: resources/mpv-libs
    to: mpv-libs
    filter:
      - '**/*'
  # Swift Now Playing helper → Contents/Resources/now-playing-helper
  - from: resources/now-playing-helper
    to: now-playing-helper
  # Swift Keychain helper → Contents/Resources/kamp-keychain-helper
  - from: resources/kamp-keychain-helper
    to: kamp-keychain-helper
  # Node.js binary + npm CLI — required for extension install/uninstall in the
  # packaged app where the user may not have Node.js on their machine.
  - from: resources/node
    to: node
  - from: resources/npm
    to: npm
    filter:
      - '**/*'
  # npm's own bundled node_modules — copied as a separate entry so app-builder
  # does not strip it (app-builder excludes node_modules from **/* by default).
  - from: resources/npm/node_modules
    to: npm/node_modules
    filter:
      - '**/*'
win:
  executableName: kamp
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - dmg
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  notarize: true
  # All kamp resources are pre-signed in parallel before electron-builder runs.
  # signIgnore skips them so electron-builder only signs the outer .app shell.
  # Python.framework binaries are pre-signed with --identifier to bypass the
  # "bundle format is ambiguous" error from the non-standard PyInstaller layout.
  signIgnore:
    - "Contents/Resources/kamp"
    - "Contents/Resources/mpv"
    - "Contents/Resources/mpv-libs"
    - "Contents/Resources/node"
    - "Contents/Resources/now-playing-helper"
    - "Contents/Resources/kamp-keychain-helper"
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
