name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Embed AcoustID key
        env:
          ACOUSTID_KEY: ${{ secrets.ACOUSTID_KEY }}
          ACOUSTID_SALT: ${{ secrets.ACOUSTID_SALT }}
        run: |
          ENCODED=$(python scripts/encode_acoustid_key.py "$ACOUSTID_KEY" "$ACOUSTID_SALT")
          ENCODED_KEY=$(echo "$ENCODED" | sed -n '1p')
          ENCODED_SALT=$(echo "$ENCODED" | sed -n '2p')
          sed -i "s|^_KEY: bytes = b\"\"|_KEY: bytes = ${ENCODED_KEY}|" kamp_daemon/acoustid.py
          sed -i "s|^_SALT: bytes = b\"\"|_SALT: bytes = ${ENCODED_SALT}|" kamp_daemon/acoustid.py

      - name: Build sdist
        run: poetry build --format sdist

      - name: Locate tarball
        id: tarball
        run: |
          TARBALL=$(ls dist/*.tar.gz | head -n1)
          echo "path=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename ${TARBALL})" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 "${{ steps.tarball.outputs.path }}" | awk '{print $1}')
          echo "value=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload sdist to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.tarball.outputs.path }}"

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          SHA256: ${{ steps.sha256.outputs.value }}
          TARBALL_NAME: ${{ steps.tarball.outputs.name }}
          GH_USERNAME: eightyeighteyes
        run: |
          VERSION="${TAG#v}"
          URL="https://github.com/${GH_USERNAME}/kamp/releases/download/${TAG}/${TARBALL_NAME}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${GH_USERNAME}/homebrew-kamp.git" tap
          cp Formula/kamp.rb tap/Formula/kamp.rb
          cd tap
          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/kamp.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/kamp.rb
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/kamp.rb
          git commit -m "kamp ${VERSION}"
          git push
