name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Check formatting
        run: poetry run black --check .

      - name: Type-check
        run: poetry run mypy kamp_daemon/

      - name: Run tests
        run: poetry run pytest

  sandbox-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run macOS sandbox tests
        run: poetry run pytest tests/test_extension_sandbox_macos.py tests/test_extension_sandbox_common.py -v --no-cov

  ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: kamp_ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: kamp_ui

      - name: Type-check
        run: npm run typecheck
        working-directory: kamp_ui

      - name: Lint
        run: npm run lint
        working-directory: kamp_ui
