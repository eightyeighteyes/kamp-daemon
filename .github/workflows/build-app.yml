name: Build macOS App

on:
  workflow_dispatch: # manual trigger for testing
  release:
    types: [published] # also fires alongside release.yml on each release

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-bundle:
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest   # Apple Silicon (arm64)
          - arch: x64
            runner: macos-15-intel # Intel (x64)
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python dependencies (includes pyinstaller)
        run: poetry install

      - name: Embed AcoustID key
        env:
          ACOUSTID_KEY: ${{ secrets.ACOUSTID_KEY }}
          ACOUSTID_SALT: ${{ secrets.ACOUSTID_SALT }}
        run: |
          ENCODED=$(python scripts/encode_acoustid_key.py "$ACOUSTID_KEY" "$ACOUSTID_SALT")
          ENCODED_KEY=$(echo "$ENCODED" | sed -n '1p')
          ENCODED_SALT=$(echo "$ENCODED" | sed -n '2p')
          # macOS sed requires an explicit empty backup suffix (-i '')
          sed -i '' "s|^_KEY: bytes = b\"\"|_KEY: bytes = ${ENCODED_KEY}|" kamp_daemon/acoustid.py
          sed -i '' "s|^_SALT: bytes = b\"\"|_SALT: bytes = ${ENCODED_SALT}|" kamp_daemon/acoustid.py

      - name: Build PyInstaller bundle
        run: |
          poetry run pyinstaller \
            --distpath kamp_ui/resources \
            --workpath /tmp/pyinstaller-work \
            --clean -y \
            kamp.spec
          echo "→ Bundle: $(ls kamp_ui/resources/kamp/kamp)"
          echo "→ Playwright absent: $(ls kamp_ui/resources/kamp/_internal/ | grep -c playwright || echo 0) files"

      - name: Verify bundle excludes Playwright
        run: |
          if ls kamp_ui/resources/kamp/_internal/ | grep -q playwright; then
            echo "ERROR: Playwright found in bundle — check kamp.spec excludes" >&2
            exit 1
          fi
          echo "OK: Playwright not bundled"

      - name: Fetch mpv binary (with bundled dylibs)
        run: |
          brew install dylibbundler mpv
          cp "$(brew --prefix)/bin/mpv" kamp_ui/resources/mpv
          chmod +x kamp_ui/resources/mpv
          # Walk mpv's full dependency tree, copy every non-system dylib into
          # mpv-libs/, and rewrite install names so mpv is fully self-contained.
          # Uses @executable_path (not @loader_path) so that bundled dylibs
          # resolving their own inter-dylib deps always look relative to the
          # mpv executable's directory, not relative to the dylib's own dir.
          # Exclude VapourSynth: it links against Homebrew Python.framework
          # (a full framework that can't be bundled), and kamp passes --no-video
          # so VapourSynth is never exercised.
          dylibbundler \
            --bundle-deps \
            --fix-file kamp_ui/resources/mpv \
            --dest-dir kamp_ui/resources/mpv-libs \
            --install-path @executable_path/mpv-libs/ \
            --overwrite-dir \
            --exclude libvapoursynth-script
          # dylibbundler adds LC_RPATH once per rewritten dep — strip all copies.
          # The load commands already use direct @executable_path/mpv-libs/<lib>
          # references so the RPATH entries are redundant and dyld rejects dupes
          # when hardened runtime is active.
          while install_name_tool -delete_rpath "@executable_path/mpv-libs/" \
              kamp_ui/resources/mpv 2>/dev/null; do :; done
          echo "→ $(file kamp_ui/resources/mpv)"
          echo "→ dylibs bundled: $(ls kamp_ui/resources/mpv-libs/ | wc -l)"
          echo "→ Verifying no Homebrew paths remain in mpv or bundled dylibs:"
          LEAKS=$(
            { otool -L kamp_ui/resources/mpv;
              find kamp_ui/resources/mpv-libs -name "*.dylib" -exec otool -L {} \;
            } | grep -E '/opt/homebrew|/usr/local/Cellar' || true
          )
          if [ -n "$LEAKS" ]; then
            echo "$LEAKS"
            echo "ERROR: Homebrew paths remain after dylibbundler" >&2
            exit 1
          fi
          echo "OK: mpv and bundled dylibs are clean"

      - name: Build Now Playing helper
        # Compile the Swift helper that owns the macOS Now Playing session and
        # routes media keys (MPRemoteCommandCenter) to Kamp. Build for the native
        # arch of each runner — the matrix produces separate arm64/x64 DMGs, so
        # there is no need for a universal binary here.
        run: |
          SWIFT_ARCH=$([ "${{ matrix.arch }}" = "x64" ] && echo "x86_64" || echo "arm64")
          swiftc -O \
            -target "${SWIFT_ARCH}-apple-macosx11.0" \
            -framework MediaPlayer \
            -Xlinker -sectcreate -Xlinker __TEXT \
            -Xlinker __info_plist -Xlinker kamp_ui/native/NowPlayingHelper.plist \
            -o kamp_ui/resources/now-playing-helper \
            kamp_ui/native/NowPlayingHelper.swift
          chmod +x kamp_ui/resources/now-playing-helper
          echo "→ $(file kamp_ui/resources/now-playing-helper)"

      - name: Build Keychain helper
        # Compile the Swift helper that gives the kamp daemon access to the
        # Data Protection Keychain. The helper carries a bound Info.plist
        # (CFBundleIdentifier = com.kamp.app) via __TEXT,__info_plist so that
        # macOS validates the keychain-access-groups entitlement at exec time.
        # Items in the DPC are tied to the code-signing identity (team ID +
        # bundle ID) rather than the binary hash, so they survive app updates
        # without triggering a keychain dialog.
        run: |
          SWIFT_ARCH=$([ "${{ matrix.arch }}" = "x64" ] && echo "x86_64" || echo "arm64")
          swiftc -O \
            -target "${SWIFT_ARCH}-apple-macosx11.0" \
            -framework Security \
            -framework Foundation \
            -Xlinker -sectcreate -Xlinker __TEXT \
            -Xlinker __info_plist -Xlinker kamp_ui/native/KeychainHelper.plist \
            -o kamp_ui/resources/kamp-keychain-helper \
            kamp_ui/native/KeychainHelper.swift
          chmod +x kamp_ui/resources/kamp-keychain-helper
          echo "→ $(file kamp_ui/resources/kamp-keychain-helper)"

      - name: Bundle Node.js + npm for extension installs
        # Each runner fetches a native node binary for its own architecture.
        run: bash scripts/fetch_node.sh --arch ${{ matrix.arch }}

      - name: Install librsvg for SVG rendering
        run: brew install librsvg

      - name: Render icon PNG from SVG
        run: |
          rsvg-convert -w 1024 -h 1024 kamp_ui/resources/icon_source.svg \
            -o kamp_ui/resources/icon_1024.png

      - name: Generate icon.icns
        run: bash scripts/make_icns.sh kamp_ui/resources/icon_1024.png

      - name: Upload bundle artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: bundle-${{ matrix.arch }}
          path: kamp_ui/resources/
          retention-days: 1

  sign-and-package:
    needs: build-bundle
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    # 90 min: pre-sign (~3-5 min) + electron-builder signing (~5 min) + notarization (up to 60+ min)
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Download bundle artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: bundle-${{ matrix.arch }}
          path: kamp_ui/resources/

      - name: Restore execute permissions
        # upload-artifact strips Unix execute bits; restore them before signing.
        run: |
          chmod +x kamp_ui/resources/kamp/kamp \
                   kamp_ui/resources/mpv \
                   kamp_ui/resources/node \
                   kamp_ui/resources/now-playing-helper \
                   kamp_ui/resources/kamp-keychain-helper
          find kamp_ui/resources/mpv-libs -name "*.dylib" -exec chmod +x {} \;

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import /tmp/cert.p12 -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm /tmp/cert.p12

      - name: Pre-sign PyInstaller bundle and native resources
        # Sign all Mach-O binaries in parallel before electron-builder runs.
        # electron-builder uses signIgnore to skip these already-signed files
        # and only signs the outer .app shell — cutting total signing time from
        # ~40 min (serial) to ~3-5 min (parallel). Safe for single-arch builds
        # because nothing rewrites the Mach-O files after this point.
        #
        # PyInstaller's Python.framework has multiple regular-file copies of the
        # Python Mach-O dylib: Versions/3.11/Python, Versions/Current/Python,
        # and Python at the framework root. All carry PyInstaller's ad-hoc
        # signature, which notarization rejects.
        #
        # The root copy (Python.framework/Python) triggers codesign's "bundle
        # format is ambiguous" error when signed in place — codesign sees the
        # .framework parent directory and treats the path as a framework bundle.
        # Sign it via a temp copy at a neutral path to avoid the context check.
        run: |
          IDENTITY="Developer ID Application"
          echo "→ Files to sign: $(find kamp_ui/resources/kamp -type f \( -name "*.so" -o -name "*.dylib" \) | wc -l)"
          echo "→ Signing .so and .dylib files (parallel)..."
          START=$(date +%s)
          find kamp_ui/resources/kamp -type f \( -name "*.so" -o -name "*.dylib" \) \
            | xargs -P8 -I{} codesign \
                --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                {}
          echo "→ Signing Python.framework/Versions/*/Python copies..."
          find kamp_ui/resources/kamp/_internal/Python.framework/Versions \
            -type f -name "Python" \
            | xargs -I{} codesign --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                --identifier "org.python.python" \
                {}
          echo "→ Replacing Python.framework/Python (root) with symlink..."
          # The root Python regular file cannot be signed: codesign sees the
          # .framework context and creates a broken signature ("bundle format is
          # ambiguous"). Replacing it with a symlink matches the standard
          # Python.framework layout; notarization follows the symlink to the
          # already-signed Versions/3.11/Python and accepts the signature.
          FWROOT=kamp_ui/resources/kamp/_internal/Python.framework
          rm "$FWROOT/Python"
          ln -s "Versions/3.11/Python" "$FWROOT/Python"
          echo "→ Python.framework/Python → Versions/3.11/Python (symlink)"
          echo "→ Signing standalone kamp Python binary..."
          codesign --force --sign "$IDENTITY" --options runtime --timestamp \
            kamp_ui/resources/kamp/_internal/Python
          echo "→ Signing kamp binary (with entitlements for PyObjC/libffi + DPC keychain)..."
          codesign --force --sign "$IDENTITY" \
            --options runtime --timestamp \
            --entitlements kamp_ui/build/entitlements.kamp.plist \
            kamp_ui/resources/kamp/kamp
          echo "→ Signing mpv-libs dylibs (parallel)..."
          find kamp_ui/resources/mpv-libs -type f -name "*.dylib" \
            | xargs -P8 -I{} codesign \
                --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                {}
          echo "→ Signing mpv and node (with entitlements)..."
          # node needs allow-jit (V8 allocates executable pages via mprotect).
          # mpv retains disable-library-validation until a clean build confirms
          # the bundled dylibs are sufficient on a Homebrew-free machine.
          codesign --force --sign "$IDENTITY" \
            --options runtime --timestamp \
            --entitlements kamp_ui/build/entitlements.mac.plist \
            kamp_ui/resources/mpv \
            kamp_ui/resources/node
          echo "→ Signing now-playing-helper..."
          # No special entitlements needed — MPNowPlayingInfoCenter and
          # MPRemoteCommandCenter are unprivileged MediaPlayer framework APIs.
          codesign --force --sign "$IDENTITY" --options runtime --timestamp \
            kamp_ui/resources/now-playing-helper
          echo "→ Signing kamp-keychain-helper (with keychain-access-groups entitlement)..."
          # The helper carries CFBundleIdentifier=com.kamp.app via __TEXT,__info_plist
          # so macOS validates the keychain-access-groups entitlement at exec time.
          # Items are bound to the team-ID+bundle-ID identity, surviving app updates.
          codesign --force --sign "$IDENTITY" \
            --options runtime --timestamp \
            --entitlements kamp_ui/build/entitlements.keychain-helper.plist \
            kamp_ui/resources/kamp-keychain-helper
          END=$(date +%s)
          echo "→ Pre-signing done in $((END-START))s"

      - name: Cache electron-builder binaries
        # electron-builder downloads dmgbuild and other native helpers on first run.
        # Caching avoids transient network failures and speeds up subsequent builds.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/Library/Caches/electron-builder
          key: electron-builder-cache-${{ matrix.arch }}-${{ hashFiles('kamp_ui/package-lock.json') }}
          restore-keys: |
            electron-builder-cache-${{ matrix.arch }}-

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: kamp_ui/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: kamp_ui

      - name: Build DMG
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-builder
        run: npm run build:mac -- --${{ matrix.arch }}
        working-directory: kamp_ui

      - name: Verify DMG contents
        run: |
          DMG=$(ls kamp_ui/dist/*.dmg | head -1)
          echo "→ DMG: $DMG ($(du -sh "$DMG" | cut -f1))"

      - name: Compute artifact name
        id: artifact
        # Artifact names cannot contain / : < > | * ? \ — replace / with -
        run: |
          safe="${{ github.ref_name }}"
          safe="${safe//\//-}"
          echo "name=Kamp-${safe}-mac-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: kamp_ui/dist/*.dmg
          retention-days: 30

      - name: Upload DMG to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            kamp_ui/dist/*.dmg
