name: Build macOS App

on:
  workflow_dispatch: # manual trigger for testing
  release:
    types: [published] # also fires alongside release.yml on each release

permissions:
  contents: write

jobs:
  build-mac-app:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python dependencies (includes pyinstaller)
        run: poetry install

      - name: Embed AcoustID key
        env:
          ACOUSTID_KEY: ${{ secrets.ACOUSTID_KEY }}
          ACOUSTID_SALT: ${{ secrets.ACOUSTID_SALT }}
        run: |
          ENCODED=$(python scripts/encode_acoustid_key.py "$ACOUSTID_KEY" "$ACOUSTID_SALT")
          ENCODED_KEY=$(echo "$ENCODED" | sed -n '1p')
          ENCODED_SALT=$(echo "$ENCODED" | sed -n '2p')
          # macOS sed requires an explicit empty backup suffix (-i '')
          sed -i '' "s|^_KEY: bytes = b\"\"|_KEY: bytes = ${ENCODED_KEY}|" kamp_daemon/acoustid.py
          sed -i '' "s|^_SALT: bytes = b\"\"|_SALT: bytes = ${ENCODED_SALT}|" kamp_daemon/acoustid.py

      - name: Build PyInstaller bundle
        run: |
          poetry run pyinstaller \
            --distpath kamp_ui/resources \
            --workpath /tmp/pyinstaller-work \
            --clean -y \
            kamp.spec
          echo "→ Bundle: $(ls kamp_ui/resources/kamp/kamp)"
          echo "→ Playwright absent: $(ls kamp_ui/resources/kamp/_internal/ | grep -c playwright || echo 0) files"

      - name: Verify bundle excludes Playwright
        run: |
          if ls kamp_ui/resources/kamp/_internal/ | grep -q playwright; then
            echo "ERROR: Playwright found in bundle — check kamp.spec excludes" >&2
            exit 1
          fi
          echo "OK: Playwright not bundled"

      - name: Fetch mpv binary
        run: |
          brew install mpv
          cp "$(brew --prefix)/bin/mpv" kamp_ui/resources/mpv
          chmod +x kamp_ui/resources/mpv
          echo "→ $(file kamp_ui/resources/mpv)"

      - name: Bundle Node.js + npm for extension installs
        # Universal binary (lipo arm64 + x64) so extension install works on
        # both Apple Silicon and Intel Macs.
        run: bash scripts/fetch_node.sh --arch universal

      - name: Install librsvg for SVG rendering
        run: brew install librsvg

      - name: Render icon PNG from SVG
        run: |
          rsvg-convert -w 1024 -h 1024 kamp_ui/resources/icon_source.svg \
            -o kamp_ui/resources/icon_1024.png

      - name: Generate icon.icns
        run: bash scripts/make_icns.sh kamp_ui/resources/icon_1024.png

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kamp_ui/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: kamp_ui

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Decode the .p12 into a temporary keychain so codesign can find it.
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo "$CSC_LINK" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          # Resolve the identity name for the pre-signing step below.
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "→ Signing identity: $IDENTITY"

      - name: Pre-sign PyInstaller bundle and mpv
        # electron-builder signs every file in the bundle serially, which takes
        # ~1 hour for the PyInstaller _internal/ tree. Pre-signing in parallel
        # (xargs -P8) with --timestamp reduces this to a few minutes by batching
        # the timestamp server round-trips. electron-builder then only has to
        # re-sign the outer .app shell.
        run: |
          IDENTITY="$SIGNING_IDENTITY"
          sign_file() {
            codesign --sign "$IDENTITY" --timestamp --options runtime \
              --force "$1" 2>/dev/null || true
          }
          export -f sign_file
          export IDENTITY

          # Sign all Mach-O binaries inside the PyInstaller bundle in parallel.
          find kamp_ui/resources/kamp -type f \( -name "*.so" -o -name "*.dylib" -o -perm +0111 \) \
            | xargs -P8 -I{} bash -c 'sign_file "$@"' _ {}

          # Sign the main kamp executable last (after its dependencies).
          codesign --sign "$IDENTITY" --timestamp --options runtime \
            --force kamp_ui/resources/kamp/kamp

          # Sign mpv.
          codesign --sign "$IDENTITY" --timestamp --options runtime \
            --force kamp_ui/resources/mpv

          echo "→ Pre-signing complete"

      - name: Build DMG
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-builder
        # --universal produces a single DMG containing a fat binary that runs
        # natively on both Apple Silicon (arm64) and Intel (x64) Macs.
        run: npm run build:mac -- --universal
        working-directory: kamp_ui

      - name: Verify DMG contents
        run: |
          DMG=$(ls kamp_ui/dist/*.dmg | head -1)
          echo "→ DMG: $DMG ($(du -sh "$DMG" | cut -f1))"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kamp-${{ github.ref_name }}-mac
          path: kamp_ui/dist/*.dmg
          retention-days: 30

      - name: Upload DMG to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            kamp_ui/dist/*.dmg
