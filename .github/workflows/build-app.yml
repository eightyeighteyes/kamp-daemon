name: Build App

on:
  workflow_dispatch: # manual trigger for testing
  release:
    types: [published] # also fires alongside release.yml on each release

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-bundle:
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest   # Apple Silicon (arm64)
          - arch: x64
            runner: macos-15-intel # Intel (x64)
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python dependencies (includes pyinstaller)
        run: poetry install

      - name: Embed AcoustID key
        env:
          ACOUSTID_KEY: ${{ secrets.ACOUSTID_KEY }}
          ACOUSTID_SALT: ${{ secrets.ACOUSTID_SALT }}
        run: python scripts/embed_acoustid_key.py

      - name: Build PyInstaller bundle
        run: |
          poetry run pyinstaller \
            --distpath kamp_ui/resources \
            --workpath /tmp/pyinstaller-work \
            --clean -y \
            kamp.spec
          echo "→ Bundle: $(ls kamp_ui/resources/kamp/kamp)"
          echo "→ Playwright absent: $(ls kamp_ui/resources/kamp/_internal/ | grep -c playwright || echo 0) files"

      - name: Audit bundle for Homebrew-linked dylibs
        run: |
          HOMEBREW_LEAKS=$(find kamp_ui/resources/kamp -type f \( -name "*.so" -o -name "*.dylib" \) \
            -exec otool -L {} \; 2>/dev/null \
            | grep -E '/opt/homebrew|/usr/local/Cellar' | wc -l)
          echo "→ Homebrew-linked deps found: $HOMEBREW_LEAKS"
          if [ "$HOMEBREW_LEAKS" -gt 0 ]; then
            find kamp_ui/resources/kamp -type f \( -name "*.so" -o -name "*.dylib" \) \
              -exec sh -c 'otool -L "$1" | grep -E "/opt/homebrew|/usr/local/Cellar" && echo "  ↑ in $1"' _ {} \;
            exit 1
          fi

      - name: Verify bundle excludes Playwright
        run: |
          if ls kamp_ui/resources/kamp/_internal/ | grep -q playwright; then
            echo "ERROR: Playwright found in bundle — check kamp.spec excludes" >&2
            exit 1
          fi
          echo "OK: Playwright not bundled"

      - name: Build minimal mpv from source
        # Build mpv with only the capabilities kamp needs: audio decoding (FFmpeg)
        # and audio output (CoreAudio, a system framework). All video, scripting,
        # disc, and Linux-specific features are disabled. This avoids VapourSynth
        # (which embeds an unbundleable Python.framework) and drops the bundle
        # from ~47 to ~32 dylibs. libplacebo is a required dep in v0.41.0 and
        # has no disable flag; it pulls in shaderc/vulkan-loader transitively.
        run: |
          brew install dylibbundler meson ninja ffmpeg libass libplacebo
          git clone --depth=1 --branch v0.41.0 \
            https://github.com/mpv-player/mpv.git /tmp/mpv-src
          cd /tmp/mpv-src
          export MACOSX_DEPLOYMENT_TARGET=11.0
          meson setup build \
            -Dbuildtype=release \
            -Dvapoursynth=disabled \
            -Djavascript=disabled \
            -Dlua=disabled \
            -Dlibbluray=disabled \
            -Ddvdnav=disabled \
            -Dcdda=disabled \
            -Ddrm=disabled \
            -Dwayland=disabled \
            -Dx11=disabled \
            -Dsdl2-audio=disabled \
            -Dsdl2-video=disabled \
            -Dsdl2-gamepad=disabled \
            -Dopenal=disabled \
            -Djack=disabled \
            -Dpulse=disabled \
            -Dalsa=disabled \
            -Dvulkan=disabled \
            -Dshaderc=disabled \
            -Dpipewire=disabled
          ninja -C build
          cp build/mpv "$GITHUB_WORKSPACE/kamp_ui/resources/mpv"
          chmod +x "$GITHUB_WORKSPACE/kamp_ui/resources/mpv"
          echo "→ $(file "$GITHUB_WORKSPACE/kamp_ui/resources/mpv")"
          echo "→ Pre-bundle deps:"
          otool -L "$GITHUB_WORKSPACE/kamp_ui/resources/mpv"

      - name: Bundle mpv dylibs
        # Walk mpv's dependency tree, copy every non-system dylib into mpv-libs/,
        # and rewrite install names so mpv is fully self-contained.
        # Uses @executable_path so bundled dylibs resolve their inter-dylib deps
        # relative to the mpv executable's directory.
        run: |
          dylibbundler \
            --bundle-deps \
            --fix-file kamp_ui/resources/mpv \
            --dest-dir kamp_ui/resources/mpv-libs \
            --install-path @executable_path/mpv-libs/ \
            --overwrite-dir
          # dylibbundler adds LC_RPATH once per rewritten dep — strip all copies.
          # Load commands already use direct @executable_path/mpv-libs/<lib>
          # references; RPATH entries are redundant and dyld rejects dupes
          # when hardened runtime is active.
          while install_name_tool -delete_rpath "@executable_path/mpv-libs/" \
              kamp_ui/resources/mpv 2>/dev/null; do :; done
          echo "→ $(file kamp_ui/resources/mpv)"
          echo "→ dylibs bundled: $(ls kamp_ui/resources/mpv-libs/ | wc -l)"
          echo "→ Verifying no Homebrew paths remain in mpv or bundled dylibs:"
          LEAKS=$(
            { otool -L kamp_ui/resources/mpv;
              find kamp_ui/resources/mpv-libs -name "*.dylib" -exec otool -L {} \;
            } | grep -E '/opt/homebrew|/usr/local/Cellar' || true
          )
          if [ -n "$LEAKS" ]; then
            echo "$LEAKS"
            echo "ERROR: Homebrew paths remain after dylibbundler" >&2
            exit 1
          fi
          echo "OK: mpv and bundled dylibs are clean"
          echo "→ Verifying no VapourSynth or LuaJIT in bundle:"
          UNWANTED=$(ls kamp_ui/resources/mpv-libs/ | grep -E 'vapoursynth|luajit' || true)
          if [ -n "$UNWANTED" ]; then
            echo "$UNWANTED"
            echo "ERROR: non-audio dylibs found in mpv-libs — check meson feature flags" >&2
            exit 1
          fi
          echo "OK: no non-audio dylibs in bundle"
          echo "→ Verifying no Swift system dylibs were bundled:"
          SWIFT_LIBS=$(ls kamp_ui/resources/mpv-libs/ | grep '^libswift' || true)
          if [ -n "$SWIFT_LIBS" ]; then
            echo "$SWIFT_LIBS"
            echo "ERROR: Swift dylibs must not be bundled (OS-provided at /usr/lib/swift/)" >&2
            exit 1
          fi
          echo "OK: no Swift dylibs bundled"

      - name: Build Now Playing helper
        # Compile the Swift helper that owns the macOS Now Playing session and
        # routes media keys (MPRemoteCommandCenter) to Kamp. Build for the native
        # arch of each runner — the matrix produces separate arm64/x64 DMGs, so
        # there is no need for a universal binary here.
        run: |
          SWIFT_ARCH=$([ "${{ matrix.arch }}" = "x64" ] && echo "x86_64" || echo "arm64")
          swiftc -O \
            -target "${SWIFT_ARCH}-apple-macosx11.0" \
            -framework MediaPlayer \
            -Xlinker -sectcreate -Xlinker __TEXT \
            -Xlinker __info_plist -Xlinker kamp_ui/native/NowPlayingHelper.plist \
            -o kamp_ui/resources/now-playing-helper \
            kamp_ui/native/NowPlayingHelper.swift
          chmod +x kamp_ui/resources/now-playing-helper
          echo "→ $(file kamp_ui/resources/now-playing-helper)"

      - name: Build Keychain helper
        # Compile the Swift helper that gives the kamp daemon access to the
        # Data Protection Keychain. The helper carries a bound Info.plist
        # (CFBundleIdentifier = com.kamp.app) via __TEXT,__info_plist so that
        # macOS validates the keychain-access-groups entitlement at exec time.
        # Items in the DPC are tied to the code-signing identity (team ID +
        # bundle ID) rather than the binary hash, so they survive app updates
        # without triggering a keychain dialog.
        run: |
          SWIFT_ARCH=$([ "${{ matrix.arch }}" = "x64" ] && echo "x86_64" || echo "arm64")
          swiftc -O \
            -target "${SWIFT_ARCH}-apple-macosx11.0" \
            -framework Security \
            -framework Foundation \
            -Xlinker -sectcreate -Xlinker __TEXT \
            -Xlinker __info_plist -Xlinker kamp_ui/native/KeychainHelper.plist \
            -o kamp_ui/resources/kamp-keychain-helper \
            kamp_ui/native/KeychainHelper.swift
          chmod +x kamp_ui/resources/kamp-keychain-helper
          echo "→ $(file kamp_ui/resources/kamp-keychain-helper)"

      - name: Bundle Node.js + npm for extension installs
        # Each runner fetches a native node binary for its own architecture.
        run: bash scripts/fetch_node.sh --arch ${{ matrix.arch }}

      - name: Install librsvg for SVG rendering
        run: brew install librsvg

      - name: Render icon PNG from SVG
        run: |
          rsvg-convert -w 1024 -h 1024 kamp_ui/resources/icon_source.svg \
            -o kamp_ui/resources/icon_1024.png

      - name: Generate icon.icns
        run: bash scripts/make_icns.sh kamp_ui/resources/icon_1024.png

      - name: Upload bundle artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: bundle-${{ matrix.arch }}
          path: kamp_ui/resources/
          retention-days: 1

  sign-and-package:
    needs: build-bundle
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    # 90 min: pre-sign (~3-5 min) + electron-builder signing (~5 min) + notarization (up to 60+ min)
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Download bundle artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: bundle-${{ matrix.arch }}
          path: kamp_ui/resources/

      - name: Restore execute permissions
        # upload-artifact strips Unix execute bits; restore them before signing.
        run: |
          chmod +x kamp_ui/resources/kamp/kamp \
                   kamp_ui/resources/mpv \
                   kamp_ui/resources/node \
                   kamp_ui/resources/now-playing-helper \
                   kamp_ui/resources/kamp-keychain-helper
          find kamp_ui/resources/mpv-libs -name "*.dylib" -exec chmod +x {} \;

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import /tmp/cert.p12 -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm /tmp/cert.p12

      - name: Pre-sign PyInstaller bundle and native resources
        # Sign all Mach-O binaries in parallel before electron-builder runs.
        # electron-builder uses signIgnore to skip these already-signed files
        # and only signs the outer .app shell — cutting total signing time from
        # ~40 min (serial) to ~3-5 min (parallel). Safe for single-arch builds
        # because nothing rewrites the Mach-O files after this point.
        #
        # PyInstaller's Python.framework has multiple regular-file copies of the
        # Python Mach-O dylib: Versions/3.11/Python, Versions/Current/Python,
        # and Python at the framework root. All carry PyInstaller's ad-hoc
        # signature, which notarization rejects.
        #
        # The root copy (Python.framework/Python) triggers codesign's "bundle
        # format is ambiguous" error when signed in place — codesign sees the
        # .framework parent directory and treats the path as a framework bundle.
        # Sign it via a temp copy at a neutral path to avoid the context check.
        run: |
          IDENTITY="Developer ID Application"
          echo "→ Files to sign: $(find kamp_ui/resources/kamp -type f \( -name "*.so" -o -name "*.dylib" \) | wc -l)"
          echo "→ Signing .so and .dylib files (parallel)..."
          START=$(date +%s)
          find kamp_ui/resources/kamp -type f \( -name "*.so" -o -name "*.dylib" \) \
            | xargs -P8 -I{} codesign \
                --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                {}
          echo "→ Signing Python.framework/Versions/*/Python copies..."
          find kamp_ui/resources/kamp/_internal/Python.framework/Versions \
            -type f -name "Python" \
            | xargs -I{} codesign --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                --identifier "org.python.python" \
                {}
          echo "→ Replacing Python.framework/Python (root) with symlink..."
          # The root Python regular file cannot be signed: codesign sees the
          # .framework context and creates a broken signature ("bundle format is
          # ambiguous"). Replacing it with a symlink matches the standard
          # Python.framework layout; notarization follows the symlink to the
          # already-signed Versions/3.11/Python and accepts the signature.
          FWROOT=kamp_ui/resources/kamp/_internal/Python.framework
          rm "$FWROOT/Python"
          ln -s "Versions/3.11/Python" "$FWROOT/Python"
          echo "→ Python.framework/Python → Versions/3.11/Python (symlink)"
          echo "→ Signing standalone kamp Python binary..."
          codesign --force --sign "$IDENTITY" --options runtime --timestamp \
            kamp_ui/resources/kamp/_internal/Python
          echo "→ Signing kamp binary (with entitlements for PyObjC/libffi + DPC keychain)..."
          codesign --force --sign "$IDENTITY" \
            --options runtime --timestamp \
            --entitlements kamp_ui/build/entitlements.kamp.plist \
            kamp_ui/resources/kamp/kamp
          echo "→ Signing mpv-libs dylibs (parallel)..."
          find kamp_ui/resources/mpv-libs -type f -name "*.dylib" \
            | xargs -P8 -I{} codesign \
                --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                {}
          echo "→ Signing mpv and node (with entitlements)..."
          # node needs allow-jit (V8 allocates executable pages via mprotect).
          # mpv shares this entitlements file; disable-library-validation is
          # retained as a belt-and-suspenders measure until a clean-machine
          # smoke test confirms the bundled dylibs resolve without it.
          codesign --force --sign "$IDENTITY" \
            --options runtime --timestamp \
            --entitlements kamp_ui/build/entitlements.mac.plist \
            kamp_ui/resources/mpv \
            kamp_ui/resources/node
          echo "→ Signing now-playing-helper..."
          # No special entitlements needed — MPNowPlayingInfoCenter and
          # MPRemoteCommandCenter are unprivileged MediaPlayer framework APIs.
          codesign --force --sign "$IDENTITY" --options runtime --timestamp \
            kamp_ui/resources/now-playing-helper
          echo "→ Signing kamp-keychain-helper (with keychain-access-groups entitlement)..."
          # The helper carries CFBundleIdentifier=com.kamp.app via __TEXT,__info_plist
          # so macOS validates the keychain-access-groups entitlement at exec time.
          # Items are bound to the team-ID+bundle-ID identity, surviving app updates.
          codesign --force --sign "$IDENTITY" \
            --options runtime --timestamp \
            --entitlements kamp_ui/build/entitlements.keychain-helper.plist \
            kamp_ui/resources/kamp-keychain-helper
          END=$(date +%s)
          echo "→ Pre-signing done in $((END-START))s"

      - name: Cache electron-builder binaries
        # electron-builder downloads dmgbuild and other native helpers on first run.
        # Caching avoids transient network failures and speeds up subsequent builds.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/Library/Caches/electron-builder
          key: electron-builder-cache-${{ matrix.arch }}-${{ hashFiles('kamp_ui/package-lock.json') }}
          restore-keys: |
            electron-builder-cache-${{ matrix.arch }}-

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: kamp_ui/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: kamp_ui

      - name: Build DMG
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-builder
        run: npm run build:mac -- --${{ matrix.arch }}
        working-directory: kamp_ui

      - name: Verify DMG contents
        run: |
          DMG=$(ls kamp_ui/dist/*.dmg | head -1)
          echo "→ DMG: $DMG ($(du -sh "$DMG" | cut -f1))"

      - name: Compute artifact name
        id: artifact
        # Artifact names cannot contain / : < > | * ? \ — replace / with -
        run: |
          safe="${{ github.ref_name }}"
          safe="${safe//\//-}"
          echo "name=Kamp-${safe}-mac-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: kamp_ui/dist/*.dmg
          retention-days: 30

      - name: Upload DMG to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            kamp_ui/dist/*.dmg

  build-bundle-windows:
    runs-on: windows-latest
    # PyInstaller (~3 min) + MSYS2 deps (~5 min) + mpv compile (~10-15 min)
    # + node fetch (~1 min) + icon gen (~1 min). Match the macOS budget.
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python dependencies (includes pyinstaller)
        run: poetry install

      - name: Embed AcoustID key
        env:
          ACOUSTID_KEY: ${{ secrets.ACOUSTID_KEY }}
          ACOUSTID_SALT: ${{ secrets.ACOUSTID_SALT }}
        run: python scripts/embed_acoustid_key.py

      - name: Build PyInstaller bundle
        run: |
          poetry run pyinstaller `
            --distpath kamp_ui/resources `
            --workpath $env:TEMP\pyinstaller-work `
            --clean -y `
            kamp.spec
          if (-not (Test-Path kamp_ui\resources\kamp\kamp.exe)) {
            Write-Error "PyInstaller did not produce kamp.exe"
            exit 1
          }
          $playwright = Get-ChildItem kamp_ui\resources\kamp\_internal\ -Filter "playwright*" -ErrorAction SilentlyContinue
          if ($playwright) {
            Write-Error "Playwright leaked into bundle: $($playwright.Name)"
            exit 1
          }
          Write-Host "OK: kamp.exe built, Playwright excluded"

      - name: Build minimal mpv from source (MSYS2 + mingw-w64)
        # Mirrors the macOS source-build approach. Pinned to mpv v0.41.0 with
        # the same audio-only feature set; uses the MSYS2 mingw-w64 toolchain
        # preinstalled on windows-latest. Output: resources\mpv\mpv.exe + DLLs.
        run: pwsh scripts/build_mpv_windows.ps1

      - name: Bundle Node.js + npm for extension installs
        run: pwsh scripts/fetch_node.ps1

      - name: Generate icon.ico from SVG
        # ImageMagick on windows-latest does not ship a reliable SVG delegate,
        # and Inkscape is no longer guaranteed to be on the runner image.
        # Use librsvg's rsvg-convert from MSYS2 (already on the box from the
        # mpv build step's pacman; install explicitly here so this step is
        # not coupled to a transitive dep) to render PNGs at standard Windows
        # shell sizes, then merge them into a single multi-resolution .ico
        # via ImageMagick (magick.exe is preinstalled on windows-latest).
        run: |
          & C:\msys64\usr\bin\bash.exe -lc 'pacman -S --needed --noconfirm mingw-w64-x86_64-librsvg'
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to install mingw-w64-x86_64-librsvg via pacman"
            exit 1
          }
          $rsvg = "C:\msys64\mingw64\bin\rsvg-convert.exe"
          if (-not (Test-Path $rsvg)) {
            Write-Error "rsvg-convert not found at $rsvg after pacman install"
            exit 1
          }
          $svg = (Resolve-Path "kamp_ui/resources/icon_source.svg").Path
          $build = "kamp_ui/build"
          New-Item -ItemType Directory -Force -Path $build | Out-Null
          $sizes = 16, 32, 48, 64, 128, 256
          $pngs = foreach ($size in $sizes) {
            $out = Join-Path $env:TEMP "kamp-icon-$size.png"
            & $rsvg -w $size -h $size $svg -o $out
            if ($LASTEXITCODE -ne 0 -or -not (Test-Path $out)) {
              Write-Error "rsvg-convert failed to render $size px PNG"
              exit 1
            }
            $out
          }
          & magick convert @pngs "$build/icon.ico"
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path "$build/icon.ico")) {
            Write-Error "icon.ico generation failed"
            exit 1
          }
          Write-Host "OK: $build/icon.ico ($((Get-Item "$build/icon.ico").Length) bytes)"

      - name: Set up Rust toolchain
        # SMTC helper (KAMP-56) is a small Rust crate at
        # kamp_ui/native/now-playing-helper-win/. The rust-toolchain.toml in
        # that directory pins to stable-x86_64-pc-windows-msvc; the action
        # honors it. windows-latest has VS Build Tools preinstalled so the
        # MSVC linker is on PATH out of the box.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - name: Cache Rust build (now-playing-helper)
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          workspaces: kamp_ui/native/now-playing-helper-win
          shared-key: now-playing-helper-win

      - name: Build Now Playing helper (Rust SMTC bridge)
        # Compiles the Windows SMTC helper and stages it at
        # resources/now-playing-helper.exe for electron-builder extraResources.
        run: pwsh kamp_ui/native/build-native.ps1

      - name: Upload bundle artifact
        # upload-artifact preserves workspace-relative paths, so multiple
        # source paths recreate that layout on download. The package job
        # downloads to GITHUB_WORKSPACE (no `path:` set) to restore both
        # kamp_ui/resources/ and kamp_ui/build/icon.ico in one shot.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: bundle-win-x64
          path: |
            kamp_ui/resources/
            kamp_ui/build/icon.ico
          retention-days: 1

  package-windows:
    needs: build-bundle-windows
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Download bundle artifact
        # upload-artifact strips the least common ancestor of all `path:` entries
        # from archive paths -- with `kamp_ui/resources/` + `kamp_ui/build/icon.ico`
        # the LCA is `kamp_ui/`, so the artifact stores `resources/...` and
        # `build/icon.ico`. Setting download path to `kamp_ui` restores the
        # layout electron-builder expects (`kamp_ui/resources/kamp/kamp.exe`).
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: bundle-win-x64
          path: kamp_ui

      - name: Verify bundle layout
        # Pre-flight: if extraResources sources are missing, electron-builder
        # silently produces a daemon-less installer (it logs "file source
        # doesn't exist" but still succeeds). Fail loudly here instead.
        run: |
          $required = @(
            'kamp_ui\resources\kamp\kamp.exe',
            'kamp_ui\resources\mpv\mpv.exe',
            'kamp_ui\resources\now-playing-helper.exe',
            'kamp_ui\resources\node.exe',
            'kamp_ui\resources\npm\bin\npm-cli.js',
            'kamp_ui\build\icon.ico'
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error "Bundle artifact missing files:`n  $($missing -join "`n  ")"
            exit 1
          }
          Write-Host "OK: bundle layout intact ($($required.Count) required paths present)"

      - name: Cache electron-builder binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~\AppData\Local\electron-builder\Cache
          key: electron-builder-cache-win-x64-${{ hashFiles('kamp_ui/package-lock.json') }}
          restore-keys: |
            electron-builder-cache-win-x64-

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: kamp_ui/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: kamp_ui

      - name: Build NSIS installer
        # Azure Trusted Signing — AZURE_TENANT_ID/CLIENT_ID/CLIENT_SECRET are read
        # by DefaultAzureCredential; the remaining four configure the account and
        # profile. See docs/code-signing.md for setup instructions.
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          DEBUG: electron-builder
        run: npm run build:win
        working-directory: kamp_ui

      - name: Verify installer artifact
        run: |
          $exe = Get-ChildItem kamp_ui\dist\*.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No NSIS installer produced under kamp_ui\dist"
            exit 1
          }
          Write-Host "-> Installer: $($exe.Name) ($([math]::Round($exe.Length / 1MB, 1)) MB)"

      - name: Compute artifact name
        id: artifact
        shell: bash
        run: |
          safe="${{ github.ref_name }}"
          safe="${safe//\//-}"
          echo "name=Kamp-${safe}-win-x64" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: kamp_ui/dist/*.exe
          retention-days: 30

      - name: Upload installer to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            kamp_ui/dist/*.exe
