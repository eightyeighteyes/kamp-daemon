name: Build macOS App

on:
  workflow_dispatch: # manual trigger for testing
  release:
    types: [published] # also fires alongside release.yml on each release

permissions:
  contents: write

jobs:
  build-mac-app:
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest   # Apple Silicon (arm64)
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python dependencies (includes pyinstaller)
        run: poetry install

      - name: Embed AcoustID key
        env:
          ACOUSTID_KEY: ${{ secrets.ACOUSTID_KEY }}
          ACOUSTID_SALT: ${{ secrets.ACOUSTID_SALT }}
        run: |
          ENCODED=$(python scripts/encode_acoustid_key.py "$ACOUSTID_KEY" "$ACOUSTID_SALT")
          ENCODED_KEY=$(echo "$ENCODED" | sed -n '1p')
          ENCODED_SALT=$(echo "$ENCODED" | sed -n '2p')
          # macOS sed requires an explicit empty backup suffix (-i '')
          sed -i '' "s|^_KEY: bytes = b\"\"|_KEY: bytes = ${ENCODED_KEY}|" kamp_daemon/acoustid.py
          sed -i '' "s|^_SALT: bytes = b\"\"|_SALT: bytes = ${ENCODED_SALT}|" kamp_daemon/acoustid.py

      - name: Build PyInstaller bundle
        run: |
          poetry run pyinstaller \
            --distpath kamp_ui/resources \
            --workpath /tmp/pyinstaller-work \
            --clean -y \
            kamp.spec
          echo "→ Bundle: $(ls kamp_ui/resources/kamp/kamp)"
          echo "→ Playwright absent: $(ls kamp_ui/resources/kamp/_internal/ | grep -c playwright || echo 0) files"

      - name: Verify bundle excludes Playwright
        run: |
          if ls kamp_ui/resources/kamp/_internal/ | grep -q playwright; then
            echo "ERROR: Playwright found in bundle — check kamp.spec excludes" >&2
            exit 1
          fi
          echo "OK: Playwright not bundled"

      - name: Fetch mpv binary
        run: |
          brew install mpv
          cp "$(brew --prefix)/bin/mpv" kamp_ui/resources/mpv
          chmod +x kamp_ui/resources/mpv
          echo "→ $(file kamp_ui/resources/mpv)"

      - name: Bundle Node.js + npm for extension installs
        # Each runner fetches a native node binary for its own architecture.
        run: bash scripts/fetch_node.sh --arch ${{ matrix.arch }}

      - name: Install librsvg for SVG rendering
        run: brew install librsvg

      - name: Render icon PNG from SVG
        run: |
          rsvg-convert -w 1024 -h 1024 kamp_ui/resources/icon_source.svg \
            -o kamp_ui/resources/icon_1024.png

      - name: Generate icon.icns
        run: bash scripts/make_icns.sh kamp_ui/resources/icon_1024.png

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import /tmp/cert.p12 -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm /tmp/cert.p12

      - name: Pre-sign PyInstaller bundle and native resources
        # Sign all Mach-O binaries in parallel before electron-builder runs.
        # electron-builder then uses signIgnore to skip these already-signed files
        # and only signs the outer .app shell — cutting signing time from ~45 min
        # to ~2 min. Safe for single-arch builds because nothing rewrites the
        # Mach-O files after this point (no @electron/universal merge step).
        run: |
          IDENTITY="Developer ID Application"
          echo "→ Signing .so and .dylib files (parallel)..."
          find kamp_ui/resources/kamp -type f \( -name "*.so" -o -name "*.dylib" \) \
            | xargs -P8 -I{} codesign \
                --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                {}
          echo "→ Signing framework binaries (no extension)..."
          find kamp_ui/resources/kamp -type f -name "Python" \
            | xargs -I{} codesign \
                --force --sign "$IDENTITY" \
                --options runtime --timestamp \
                {}
          echo "→ Signing main executables..."
          codesign --force --sign "$IDENTITY" \
            --options runtime --timestamp \
            kamp_ui/resources/kamp/kamp \
            kamp_ui/resources/mpv \
            kamp_ui/resources/node
          echo "→ Pre-signing complete"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kamp_ui/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: kamp_ui

      - name: Build DMG
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-builder
        run: npm run build:mac -- --${{ matrix.arch }}
        working-directory: kamp_ui

      - name: Verify DMG contents
        run: |
          DMG=$(ls kamp_ui/dist/*.dmg | head -1)
          echo "→ DMG: $DMG ($(du -sh "$DMG" | cut -f1))"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kamp-${{ github.ref_name }}-mac-${{ matrix.arch }}
          path: kamp_ui/dist/*.dmg
          retention-days: 30

      - name: Upload DMG to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            kamp_ui/dist/*.dmg
